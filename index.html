<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Banco de Preguntas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "nanoid": "https://esm.sh/nanoid@5.0.7"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <div class="filters">
        <div class="filter-item">
          <label class="filter-label">Categoría</label>
          <select id="filter-category" class="chip-select">
            <option value="">Todas</option>
          </select>
        </div>
        <div class="filter-item">
          <label class="filter-label">Tema</label>
          <select id="filter-topic" class="chip-select">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="filter-item">
          <label class="filter-label">Tipo</label>
          <select id="filter-type" class="chip-select">
            <option value="">Todos</option>
          </select>
        </div>
      </div>
      <button id="btn-add" class="primary-btn">Agregar Pregunta</button>
    </header>

    <main class="content">
      <section id="cards-container" class="cards"></section>
    </main>
  </div>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Nueva pregunta</h2>
        <button id="modal-close" class="icon-btn" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-row">
          <label class="field-label">Categoría</label>
          <div id="modal-category" class="filter-select"></div>
        </div>
        <div class="modal-row">
          <label class="field-label">Tema</label>
          <div id="modal-topic" class="filter-select"></div>
        </div>
        <div class="modal-row">
          <label class="field-label">Tipo de cuestionario</label>
          <div id="modal-type" class="filter-select"></div>
        </div>

        <div class="modal-row">
          <label class="field-label" for="modal-question">Pregunta</label>
          <textarea id="modal-question" class="text-input" rows="3" disabled></textarea>
        </div>
        <div class="modal-row">
          <label class="field-label" for="modal-answer">Respuesta</label>
          <textarea id="modal-answer" class="text-input" rows="3" disabled></textarea>
        </div>
        <div class="modal-row">
          <label class="field-label" for="modal-notes">Observaciones</label>
          <textarea id="modal-notes" class="text-input" rows="2" disabled></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-save" class="primary-btn">Guardar Pregunta</button>
      </div>
    </div>
  </div>

  <script type="module" src="storage.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
